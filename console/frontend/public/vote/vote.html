<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#07040f" />
    <title>Voice of NYC · 现场投票</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bungee&family=Noto+Serif+SC:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./vote.css" />
  </head>
  <body>
    <div id="vp-root">
      <header class="vp-brand">
        <h1 id="vp-page-title">心动的声音</h1>
        <p id="vp-page-subtitle">
          Voice of NYC · 现场投票<br />
          轮次由链接参数决定；点选后确认提交（每人限一次）
        </p>
      </header>
      <div id="vp-banner" class="vp-banner" hidden></div>
      <div class="vp-code-wrap" id="vp-code-wrap" hidden>
        <label class="vp-code-label" for="vp-code">投票码</label>
        <input
          type="text"
          id="vp-code"
          class="vp-code-input"
          maxlength="96"
          autocomplete="one-time-code"
          placeholder="向工作人员领取"
        />
        <p class="vp-code-hint">
          仅正确且未使用的投票码会计入大屏；错误码会在页面上提示，不会加票。若你从短信打开链接，投票码可能已自动填好。
        </p>
      </div>
      <main id="vp-grid" class="vp-grid" aria-label="选手列表"></main>
    </div>
    <div class="vp-dock" aria-hidden="false">
      <div class="vp-dock-inner">
        <button type="button" class="vp-submit" id="vp-submit" disabled>确认投票</button>
      </div>
    </div>
    <script src="./vote-config.js"></script>
    <script type="module" src="./vote-app.js"></script>
  </body>
</html>
